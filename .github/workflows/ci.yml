name: ShieldOps DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: shieldops
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Tag Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} ${{ env.DOCKER_IMAGE }}:latest
      - name: Save Docker Image
        run: docker save ${{ env.DOCKER_IMAGE }}:latest -o shieldops-image.tar
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: shieldops-image.tar
          retention-days: 1

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests with Coverage
        # Assumes test files are moved into the 'tests/' folder
        run: pytest tests/ --cov=app --cov-report=html
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  security-scan:
    name: Security Scanning (Quality Gates)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: SAST - Semgrep Scan (Quality Gate)
        continue-on-error: true
        run: |
          pip install semgrep
          # Scans source code and FAILS if security issues are found
          semgrep scan --config="p/python" --config="p/javascript" --config="p/owasp-top-ten" --json --output=semgrep-report.json --error .

      - name: Dependency Scan - Safety Scan (Quality Gate)
        continue-on-error: true
        run: |
          pip install "safety<3.0.0"
          # Scan requirements.txt specifically to avoid runner-preinstalled package noise
          safety check -r requirements.txt --json > safety-report.json

      - name: Filesystem Scan - Trivy (Generate Report)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'

      - name: Quality Gate - Trivy Fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: 1
          severity: 'HIGH,CRITICAL'
          ignore-unfixed: true

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            semgrep-report.json
            safety-report.json
            trivy-report.json

  dast-scan:
    name: DAST Scan - OWASP ZAP
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
      - name: Load and Run Application Container
        run: |
          docker load -i shieldops-image.tar
          # Run with HOST=0.0.0.0 so it's accessible to ZAP
          docker run -d -p 5000:5000 -e HOST=0.0.0.0 --name shieldops-app ${{ env.DOCKER_IMAGE }}:latest
          echo "Waiting for application to start..."
          sleep 20

      - name: Get Runner IP
        id: ip
        run: echo "runner_ip=$(hostname -I | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Fix permissions for ZAP
        run: |
          # ZAP container runs as UID 1000, needs write access to workspace
          sudo chmod -R 777 .

      - name: OWASP ZAP Baseline Scan (Direct Docker)
        run: |
          # Direct docker run ensures correct path resolution for zap.conf and ignores internal action bugs
          docker run --network=host -v $(pwd):/zap/wrk/:rw -t ghcr.io/zaproxy/zaproxy:stable zap-baseline.py \
            -t http://localhost:5000 \
            -c /zap/wrk/zap.conf \
            -J /zap/wrk/report_json.json \
            -w /zap/wrk/report_md.md \
            -r /zap/wrk/report_html.html || true

      - name: Upload ZAP Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-reports
          path: |
            report_html.html
            report_json.json
            report_md.md
