name: ShieldOps DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_IMAGE: shieldops
  DOCKER_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and Tag Docker Image
        run: |
          docker build -t ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} .
          docker tag ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }} ${{ env.DOCKER_IMAGE }}:latest
      - name: Save Docker Image
        run: docker save ${{ env.DOCKER_IMAGE }}:latest -o shieldops-image.tar
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: shieldops-image.tar
          retention-days: 1

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Tests with Coverage
        # Assumes test files are moved into the 'tests/' folder
        run: pytest tests/ --cov=app --cov-report=html
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  security-scan:
    name: Security Scanning (Quality Gates)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: SAST - Semgrep Scan (Quality Gate)
        run: |
          pip install semgrep
          # Scans source code and FAILS if OWASP Top 10 issues are found
          semgrep scan --config="p/owasp-top-ten" --json --output=semgrep-report.json --error .

      - name: Dependency Scan - Safety Check (Quality Gate)
        run: |
          pip install safety
          # FAILS if vulnerable dependencies are found in requirements.txt
          safety check

      - name: Filesystem Scan - Trivy (Generate Report)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'

      - name: Quality Gate - Trivy Fail on HIGH/CRITICAL
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          exit-code: 1
          severity: 'HIGH,CRITICAL'

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            semgrep-report.json
            trivy-report.json

  dast-scan:
    name: DAST Scan - OWASP ZAP
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - name: Download Docker Image
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load and Run Application Container
        run: |
          docker load -i shieldops-image.tar
          docker run -d -p 5000:5000 --name shieldops-app ${{ env.DOCKER_IMAGE }}:latest
          echo "Waiting for application to start..."
          sleep 15

      - name: Get Runner IP
        # Workaround to allow the ZAP container to target the app container
        id: ip
        run: echo "runner_ip=$(hostname -I | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://${{ steps.ip.outputs.runner_ip }}:5000'
          allow_issue_writing: false
          fail_action: false # True to fail pipeline on DAST issues

      - name: Upload ZAP HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
